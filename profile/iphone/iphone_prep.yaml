epi_th: 0.001
depth_boundary_th: 1.0

dep_mode: sensor
tap_mode: bootstapir
flow_mode: raft

tap_chunk_size: 5000
n_track_uniform: 8192
n_track_dynamic: 16384

flow_steps: [1, 3]
epi_num_threads: 64 # Null

align_metric_flag: True
boundary_enhance_th: -1

# Use scene-local SAM3 masks for dynamic TAP resampling when available.
dynamic_mask_dirname: sam3_dymask
dynamic_mask_required: True
dynamic_mask_threshold: 0.5
precompute_dynamic_mask_mode: replace
